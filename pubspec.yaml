name: azizi_tarany
description: Pashto audio tarany app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.10.6
  url_launcher: ^6.3.2
  font_awesome_flutter: 10.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/cover.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/icon.png
  min_sdk_android: 21
